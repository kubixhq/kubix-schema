[changelog]
header = """
# Changelog\n
All notable changes to kubix-schema are documented here.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {% if commit.breaking %}**BREAKING** {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))\
{% if commit.body %}

  {{ commit.body | indent(prefix="  ") }}
{% endif %}
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
  { pattern = '\(#(\d+)\)', replace = "([#${1}](../../issues/${1}))" },
]
commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^test",     group = "Testing" },
  { message = "^docs",     group = "Documentation" },
  { message = "^chore",    group = "Miscellaneous", skip = true },
  { message = "^ci",       group = "Miscellaneous", skip = true },
  { message = "^build",    group = "Miscellaneous", skip = true },
  { body = ".*security",   group = "Security" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
